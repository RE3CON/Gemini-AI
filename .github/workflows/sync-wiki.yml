name: Sync Wiki

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout wiki
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync docs to wiki
        run: |
          # Ensure docs directory exists in main
          if [ -d "main/docs" ]; then
            # Sync files from main/docs to wiki/
            # We use rsync to keep it clean, excluding the .git directory
            rsync -av --delete main/docs/ wiki/ --exclude .git
            
            cd wiki
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            
            # Check if there are changes
            if [ -n "$(git status --porcelain)" ]; then
              git add .
              git commit -m "Sync documentation from main repository"
              git push
            else
              echo "No changes to sync."
            fi
          else
            echo "Docs directory not found in main repository."
          fi
